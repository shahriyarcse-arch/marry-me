<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Will You Marry Me?</title>

<style>

/* Reset */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
}

/* Background */
.background{
    position:fixed;
    width:200%;
    height:200%;
    background:linear-gradient(45deg,#ff4e50,#ff758c,#ff7eb3,#ff2e63);
    background-size:400% 400%;
    animation:gradientMove 12s ease infinite;
    z-index:-2;
}

@keyframes gradientMove{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* Floating Symbols */
.symbol{
    position:absolute;
    font-size:24px;
    animation:floatUp 8s linear infinite;
    opacity:0.8;
}

@keyframes floatUp{
    0%{transform:translateY(100vh); opacity:1;}
    100%{transform:translateY(-10vh); opacity:0;}
}

/* Main Card */
.container{
    text-align:center;
    background:rgba(255,255,255,0.95);
    padding:50px;
    border-radius:30px;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

/* Image */
.container img{
    width:220px;
    height:220px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:20px;
}

/* Text */
h1{
    font-size:38px;
    color:#ff2e63;
    margin-bottom:25px;
}

/* Buttons */
.button-area{
    display:flex;
    justify-content:center;
    gap:25px;
}

button{
    padding:14px 35px;
    font-size:18px;
    border:none;
    border-radius:40px;
    cursor:pointer;
    transition:0.3s;
}

#yes{
    background:#ff2e63;
    color:white;
}

#yes:hover{
    transform:scale(1.1);
}

/* No Button */
#no{
    background:#333;
    color:white;
    position:relative;
}

/* Modal */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

</style>
</head>

<body>

<div class="background"></div>

<div class="container">

    <img src="us.jpg" alt="Our Photo">

    <h1>Will You Marry Me? 💖</h1>

    <div class="button-area">
        <button id="yes">Yes ❤️</button>
        <button id="no">No 😅</button>
    </div>

</div>

<!-- Surprise Panel -->
<div class="overlay" id="overlay">
    <div class="modal">
        <h2>💖 You Said YES! 💖</h2>
        <p>Peye Gechi Tomake ❤️</p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<script>

const yesBtn = document.getElementById("yes");
const noBtn = document.getElementById("no");
const overlay = document.getElementById("overlay");

/* YES Click */
yesBtn.addEventListener("click", () => {
    overlay.style.display = "flex";
});

/* Close Modal */
function closeModal(){
    overlay.style.display = "none";
}

/* NO Button Move Safely */
noBtn.addEventListener("mouseenter", () => {

    const padding = 20;

    const maxX = window.innerWidth - noBtn.offsetWidth - padding;
    const maxY = window.innerHeight - noBtn.offsetHeight - padding;

    const x = Math.random() * maxX;
    const y = Math.random() * maxY;

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});

/* Floating Symbols */
function createSymbol(){

    const symbols = ["🌸","💖","🌹","💕","💘"];
    const symbol = document.createElement("div");

    symbol.classList.add("symbol");
    symbol.innerText = symbols[Math.floor(Math.random()*symbols.length)];

    symbol.style.left = Math.random()*100 + "vw";
    symbol.style.animationDuration = (Math.random()*3 + 5) + "s";
    symbol.style.fontSize = (Math.random()*20 + 20) + "px";

    document.body.appendChild(symbol);

    setTimeout(()=>{ symbol.remove(); },8000);
}

setInterval(createSymbol,400);

</script>

</body>
</html>
